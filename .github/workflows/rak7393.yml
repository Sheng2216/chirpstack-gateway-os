name: Build ChirpStack Gateway OS

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Build Docker image
      run: docker build -t chirpstack-gateway-os-builder -f Dockerfile-devel .

    - name: Initialize OpenWrt
      run: |
        # Create necessary directories
        mkdir -p openwrt/feeds openwrt/files conf/patches
        touch conf/patches/series

        # Run initialization in docker
        docker run --rm \
          -v $PWD:/workdir \
          -w /workdir \
          -e QUILT_PATCHES=/workdir/conf/patches \
          chirpstack-gateway-os-builder \
          bash -c "
            git config --global --add safe.directory /workdir && \
            git config --global --add safe.directory /workdir/openwrt && \
            git submodule init && \
            git submodule update && \
            cp feeds.conf.default openwrt/feeds.conf.default && \
            ln -sf ../conf/.config openwrt/.config && \
            ln -sf ../conf/files openwrt/files && \
            cd openwrt && ./scripts/feeds update -a && \
            ./scripts/feeds install -a && \
            quilt init
          "

    - name: Configure and Build
      run: |
        # Setup environment and build
        docker run --rm \
          -v $PWD:/workdir \
          -w /workdir \
          -e QUILT_PATCHES=/workdir/conf/patches \
          -e FORCE_UNSAFE_CONFIGURE=1 \
          -e TERM=xterm \
          chirpstack-gateway-os-builder \
          bash -c "
            # Switch environment
            cd openwrt && quilt pop -a || true && \
            cd .. && \
            rm -rf conf/files conf/patches conf/.config && \
            mkdir -p conf && \
            ln -sf ../rak_rak7391/files conf/files && \
            ln -sf ../rak_rak7391/patches conf/patches && \
            ln -sf ../rak_rak7391/.config conf/.config && \
            
            # Build
            cd openwrt && make defconfig && \
            make -j\$(nproc) V=s
          "

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: openwrt/bin/
        retention-days: 7
