name: Build ChirpStack Gateway OS

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Set up Docker
      uses: docker/setup-buildx-action@v3

    - name: Initialize build environment
      run: |
        make init
        
    - name: Enter development shell and build
      run: |
        # Create a script to run commands in docker
        cat > build.sh << 'EOF'
        #!/bin/bash
        make switch-env ENV=rak_rak7391
        make
        EOF
        chmod +x build.sh
        
        # Run the build script in docker environment
        make devshell CMD="./build.sh"

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: firmware
        path: bin/
        retention-days: 7
