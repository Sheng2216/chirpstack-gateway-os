name: Build ChirpStack Gateway OS

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Prepare directories
      run: |
        # 创建必要的目录并赋予正确权限（无需 sudo）
        mkdir -p openwrt/feeds openwrt/files conf/envs
        chmod -R 777 openwrt/feeds openwrt/files conf

    - name: Build Docker environment
      run: |
        # 构建 Docker 镜像时指定用户和组 ID（与宿主机一致）
        docker compose build \
          --build-arg UID=$(id -u) \
          --build-arg GID=$(id -g)

    - name: Initialize build environment
      run: |
        # 在 Docker 容器中以当前用户运行命令
        docker compose run --rm -u $(id -u):$(id -g) chirpstack-gateway-os make init

    - name: Switch environment and build
      run: |
        # 直接通过 Docker 运行构建命令（无需进入交互式 shell）
        docker compose run --rm -u $(id -u):$(id -g) chirpstack-gateway-os \
          sh -c "make switch-env ENV=rak_rak7391 && make build JOBS=$(nproc)"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: openwrt/bin/
        retention-days: 7
