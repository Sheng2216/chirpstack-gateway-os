name: Build ChirpStack Gateway OS

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install --no-install-recommends --no-install-suggests --yes \
          build-essential \
          ca-certificates \
          clang \
          flex \
          bison \
          g++ \
          gawk \
          gcc-multilib \
          g++-multilib \
          gettext \
          git \
          libncurses5-dev \
          libssl-dev \
          python3-distutils \
          rsync \
          unzip \
          zlib1g-dev \
          file \
          wget \
          curl \
          quilt \
          nano

    - name: Set up environment
      run: |
        # Set environment variables from Dockerfile
        export GCC_COLORS='error=01;31:warning=01;35:note=01;36:caret=01;32:locus=01:quote=01'
        # Set environment variables from docker-compose
        export QUILT_PATCHES=/workdir/conf/patches
        
        # Create necessary directories
        mkdir -p openwrt/feeds openwrt/files
        
        # Set ulimits as defined in docker-compose
        ulimit -n 262144

    - name: Initialize OpenWrt
      run: |
        # Modified version of make init without docker-compose
        git submodule init
        git submodule update
        cp feeds.conf.default openwrt/feeds.conf.default
        ln -sf ../conf/.config openwrt/.config
        ln -sf ../conf/files openwrt/files
        cd openwrt && ./scripts/feeds update -a
        cd openwrt && ./scripts/feeds install -a
        cd openwrt && quilt init

    - name: Configure and Build
      run: |
        # Switch environment (without docker)
        cd openwrt && quilt pop -a || true
        rm -f conf/files conf/patches conf/.config
        ln -s rak_rak7391/files conf/files
        ln -s rak_rak7391/patches conf/patches
        ln -s rak_rak7391/.config conf/.config
        cd openwrt && quilt push -a
        
        # Build (without docker)
        cd openwrt && make -j$(nproc) V=s

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: openwrt/bin/
        retention-days: 7
