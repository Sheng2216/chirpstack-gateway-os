name: Build ChirpStack Gateway OS

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        mkdir -p openwrt/feeds openwrt/files
        docker build -t chirpstack-gateway-os-builder -f Dockerfile-devel .

    - name: Initialize OpenWrt
      run: |
        docker run --rm \
          -v $PWD:/workdir \
          -w /workdir \
          --user root \
          -e QUILT_PATCHES=/workdir/conf/patches \
          chirpstack-gateway-os-builder \
          bash -c "
            # 配置 Git 安全目录
            git config --global --add safe.directory /workdir && \
            git config --global --add safe.directory /workdir/openwrt && \
            
            git submodule init && \
            git submodule update && \
            cp feeds.conf.default openwrt/feeds.conf.default && \
            ln -sf ../conf/.config openwrt/.config && \
            ln -sf ../conf/files openwrt/files && \
            cd openwrt && ./scripts/feeds update -a && \
            ./scripts/feeds install -a && \
            
            # 确保 quilt 目录存在
            mkdir -p /workdir/conf/patches && \
            touch /workdir/conf/patches/series && \
            
            quilt init && \
            chown -R buildbot:buildbot /workdir
          "

    - name: Configure and Build
      run: |
        docker run --rm \
          -v $PWD:/workdir \
          -w /workdir \
          -e ENV=rak_rak7391 \
          -e QUILT_PATCHES=/workdir/conf/patches \
          chirpstack-gateway-os-builder \
          bash -c "
            # 配置 Git 安全目录
            git config --global --add safe.directory /workdir && \
            git config --global --add safe.directory /workdir/openwrt && \
            
            # 确保目标配置目录存在
            mkdir -p conf && \
            
            # 切换环境配置
            cd openwrt && quilt pop -a || true && \
            cd .. && \
            rm -f conf/files conf/patches conf/.config && \
            mkdir -p conf && \
            ln -sf ../rak_rak7391/files conf/files && \
            ln -sf ../rak_rak7391/patches conf/patches && \
            ln -sf ../rak_rak7391/.config conf/.config && \
            
            # 应用补丁并构建
            cd openwrt && \
            [ -f ../conf/patches/series ] && quilt push -a || true && \
            make -j\$(nproc) V=s
          "

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: openwrt/bin/
        retention-days: 7
