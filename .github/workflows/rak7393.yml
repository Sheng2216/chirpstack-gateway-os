name: Build ChirpStack Gateway OS

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        # 创建必要的目录
        mkdir -p openwrt/feeds openwrt/files
        
        # 构建 Docker 镜像
        docker build -t chirpstack-gateway-os-builder -f Dockerfile-devel .

    - name: Initialize OpenWrt
      run: |
        # 使用 root 用户运行初始化命令
        docker run --rm \
          -v $PWD:/workdir \
          -w /workdir \
          --user root \
          chirpstack-gateway-os-builder \
          bash -c "
            git submodule init && \
            git submodule update && \
            cp feeds.conf.default openwrt/feeds.conf.default && \
            ln -sf ../conf/.config openwrt/.config && \
            ln -sf ../conf/files openwrt/files && \
            cd openwrt && ./scripts/feeds update -a && \
            ./scripts/feeds install -a && \
            quilt init && \
            chown -R buildbot:buildbot /workdir
          "

    - name: Configure and Build
      run: |
        # 使用 buildbot 用户运行构建命令
        docker run --rm \
          -v $PWD:/workdir \
          -w /workdir \
          -e ENV=rak_rak7391 \
          chirpstack-gateway-os-builder \
          bash -c "
            cd openwrt && quilt pop -a || true && \
            cd .. && \
            rm -f conf/files conf/patches conf/.config && \
            ln -s rak_rak7391/files conf/files && \
            ln -s rak_rak7391/patches conf/patches && \
            ln -s rak_rak7391/.config conf/.config && \
            cd openwrt && quilt push -a && \
            make -j\$(nproc) V=s
          "

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: openwrt/bin/
        retention-days: 7
